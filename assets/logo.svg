<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="100%" height="100%">
  <defs>
    <linearGradient id="goBlue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00add8"/>
      <stop offset="100%" stop-color="#004b66"/>
    </linearGradient>

    <linearGradient id="laserCyan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00FFFF"/>
      <stop offset="100%" stop-color="#00add8"/>
    </linearGradient>

    <mask id="telemetryCut">
      <rect width="800" height="300" fill="white"/>
      
      <polyline points="0,150 340,150 370,100 400,200 430,150 800,150" fill="none" stroke="black" stroke-width="12" stroke-linejoin="round"/>
      
      <circle cx="355" cy="125" r="15" fill="white"/>
      <circle cx="390" cy="168" r="25" fill="white"/>
    </mask>
  </defs>

  <rect width="800" height="300" fill="#0D1117" rx="20"/>

  <text x="400" y="240" font-family="'Segoe UI', Roboto, Helvetica, sans-serif" font-weight="900" font-size="280" fill="url(#goBlue)" text-anchor="middle" letter-spacing="-10" opacity="0.85">GO</text>

  <polyline points="50,150 340,150 370,100 400,200 430,150 750,150" fill="none" stroke="url(#laserCyan)" stroke-width="4" stroke-linejoin="round" stroke-linecap="round"/>
  <polyline points="50,150 340,150 370,100 400,200 430,150 750,150" fill="none" stroke="#00add8" stroke-width="12" stroke-linejoin="round" stroke-linecap="round" opacity="0.05"/>
  <text x="400" y="185" font-family="'Segoe UI', Roboto, Helvetica, sans-serif" font-weight="900" font-size="110" fill="#ffffff" text-anchor="middle" letter-spacing="12" mask="url(#telemetryCut)">SYSMON</text>

</svg>